name: FastAPI Habit Tracker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ${{ secrets.TEST_SECRET_KEY}}
      DATABASE_URL: "postgresql+psycopg://user:password@localhost:5432/test_db"
      ALGORITHM: ${{ secrets.TEST_ALGORITHM }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync

    - name: Lint and format code
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Run tests
      run: uv run pytest
