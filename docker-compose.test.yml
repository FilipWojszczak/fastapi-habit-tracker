services:
  test_db:
    image: postgres:17
    env_file:
      - .env.test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  tests:
    build:
      context: .
      target: testing
    env_file:
      - .env.test
    environment:
      - ENVIRONMENT=testing
    depends_on:
      test_db:
        condition: service_healthy
    command: uv run pytest -v
