services:
  test_db:
    image: postgres:17
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=test_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  tests:
    build: .
    env_file:
      - .env.test
    environment:
      - ENVIRONMENT=testing
    depends_on:
      test_db:
        condition: service_healthy
    command: uv run pytest -v